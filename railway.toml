# Railway configuration for the InView3D backend.
#
# Railway builds the backend Docker image (which bundles FFmpeg + COLMAP +
# OpenMVS) using the repo root as the build context. Provision a Redis service
# and a persistent volume in the Railway project, then set the environment
# variables listed in docs/DEPLOYMENT.md.
#
# NOTE: This image compiles OpenMVS from source — the build is large and slow,
# and the CV pipeline is CPU/RAM heavy. See docs/DEPLOYMENT.md for the caveats
# before relying on real reconstruction here.

[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/backend.Dockerfile"

[deploy]
startCommand = "node dist/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/health"
healthcheckTimeout = 300
