# ===========================================================================
# InView3D — Docker Compose
# One-command local stack: Backend + Frontend.
#
#   docker compose up --build
#
# ===========================================================================
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: inview3d-backend
    restart: unless-stopped
    environment:
      - BACKEND_PORT=4000
      - UPLOAD_PATH=/data/uploads
      - OUTPUT_PATH=/data/output
      # Allow both the deployed Vercel frontend and local dev.
      - CORS_ORIGIN=${CORS_ORIGIN:-https://inview3-d-frontend.vercel.app,https://patio-sphere-partly-suddenly.trycloudflare.com,http://localhost:3001,http://localhost:3000}
    ports:
      - '4000:4000'
    volumes:
      - ./uploads:/data/uploads
      - ./output:/data/output

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000
    container_name: inview3d-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:4000
    ports:
      - '3000:3000'
